# Painel Next.js em https://construneves.northempresarial.com
#
# Problema comum: sem este server_name, o HTTPS cai no default_server
# (ex.: PMG) e / vira redirect para /negociacoes/login.php.
#
# Instalação:
#   sudo cp /var/www/construneves/deploy/nginx-construneves.northempresarial.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/nginx-construneves.northempresarial.com.conf /etc/nginx/sites-enabled/
#
# Se o certificado wildcard não cobrir este host, rode:
#   sudo certbot certonly --nginx -d construneves.northempresarial.com
# (ajuste linhas ssl_certificate abaixo se usar outro caminho)
#
# Depois:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requisitos: construneves-painel.service e construneves-painel-api.service ativos (Next em 127.0.0.1:3010).

server {
    listen 80;
    server_name construneves.northempresarial.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name construneves.northempresarial.com;

    ssl_certificate     /etc/letsencrypt/live/northempresarial.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/northempresarial.com/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
    }
}
