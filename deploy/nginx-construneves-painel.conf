# Painel Next.js — proxy para o app em 127.0.0.1:3010
# Instalar:
#   sudo cp /var/www/construneves/deploy/nginx-construneves-painel.conf /etc/nginx/sites-available/construneves-painel
#   sudo ln -sf /etc/nginx/sites-available/construneves-painel /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Ajuste listen/server_name conforme necessário (ex.: TLS com certbot).

server {
    listen 127.0.0.1:3090;
    server_name localhost;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
    }
}
